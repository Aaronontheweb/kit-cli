name: pr_validation

on:
  push:
    branches:
      - master
      - dev
      - main
  pull_request:
    branches:
      - master
      - dev
      - main

jobs:
  test:
    name: Test-${{matrix.os}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5.0.0
        with:
          lfs: true
          fetch-depth: 0

      - name: "Install .NET SDK"
        uses: actions/setup-dotnet@v4.3.1
        with:
          global-json-file: "./global.json"

      - name: "Restore .NET tools"
        run: dotnet tool restore

      - name: "Update release notes"
        shell: pwsh
        run: |
          ./build.ps1

      - name: "dotnet build"
        run: dotnet build -c Release

      - name: "dotnet test with coverage"
        shell: bash
        run: dotnet test -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: "Test AOT Compilation"
        run: |
          cd src/KitCLI
          dotnet publish -c Release /p:PublishAot=true /p:PublishSingleFile=true --self-contained
          
      - name: "Check Binary Size"
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            BINARY_PATH="src/KitCLI/bin/Release/net9.0/linux-x64/publish/kit"
          else
            BINARY_PATH="src/KitCLI/bin/Release/net9.0/win-x64/publish/kit.exe"
          fi
          
          if [ -f "$BINARY_PATH" ]; then
            SIZE=$(du -b "$BINARY_PATH" | cut -f1)
            SIZE_MB=$((SIZE / 1048576))
            echo "Binary size: ${SIZE_MB}MB"
            
            if [ $SIZE_MB -gt 15 ]; then
              echo "ERROR: Binary size exceeds 15MB limit!"
              exit 1
            fi
          fi

      - name: "Run Code Analysis"
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet format --verify-no-changes --verbosity diagnostic
          
      - name: "dotnet pack"
        run: dotnet pack -c Release -o ./bin/nuget