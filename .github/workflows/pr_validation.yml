name: pr_validation

on:
  push:
    branches:
      - master
      - dev
      - main
  pull_request:
    branches:
      - master
      - dev
      - main

jobs:
  test:
    name: Test-${{matrix.os}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5.0.0
        with:
          lfs: true
          fetch-depth: 0

      - name: "Install .NET SDK"
        uses: actions/setup-dotnet@v5.1.0
        with:
          global-json-file: "./global.json"

      - name: "Run build script"
        shell: pwsh
        run: ./build.ps1

      - name: "Restore .NET tools"
        run: dotnet tool restore

      - name: "dotnet restore"
        run: dotnet restore

      - name: "dotnet build"
        run: dotnet build -c Release

      - name: "dotnet test"
        run: dotnet test -c Release --no-build --verbosity normal

  aot-validation:
    name: AOT-${{matrix.runtime}}
    runs-on: ${{matrix.os}}
    
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            max-size-mb: 15
          - os: windows-latest
            runtime: win-x64
            max-size-mb: 15
          - os: macos-latest
            runtime: osx-x64
            max-size-mb: 15
          # Note: Cross-compilation for ARM64 requires special setup
          # For now, we'll only validate native builds on CI

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: "Install .NET SDK"
        uses: actions/setup-dotnet@v5.1.0
        with:
          global-json-file: "./global.json"

      - name: "Restore dependencies"
        run: dotnet restore

      - name: "AOT Publish"
        run: dotnet publish src/KitCLI -c Release -r ${{ matrix.runtime }} --self-contained -o ./publish/${{ matrix.runtime }} /p:TrimmerSingleWarn=false /p:PublishTrimmed=true

      - name: "Check AOT warnings"
        if: matrix.os == 'ubuntu-latest' && matrix.runtime == 'linux-x64'
        run: dotnet publish src/KitCLI -c Release -r linux-x64 --self-contained /p:TrimmerSingleWarn=false /p:PublishTrimmed=true /p:TreatWarningsAsErrors=true /warnAsError:IL2026 /warnAsError:IL2057 /warnAsError:IL2067 /warnAsError:IL2075 /warnAsError:IL2096 /warnAsError:IL3050

      - name: "Test AOT binary"
        shell: bash
        run: |
          if [[ "${{ matrix.runtime }}" == win-* ]]; then
            ./publish/${{ matrix.runtime }}/kit.exe --version
            ./publish/${{ matrix.runtime }}/kit.exe --test-aot
          else
            ./publish/${{ matrix.runtime }}/kit --version
            ./publish/${{ matrix.runtime }}/kit --test-aot
          fi

      - name: "Check binary size"
        shell: bash
        run: |
          if [[ "${{ matrix.runtime }}" == win-* ]]; then
            BINARY_PATH="./publish/${{ matrix.runtime }}/kit.exe"
          else
            BINARY_PATH="./publish/${{ matrix.runtime }}/kit"
          fi
          
          SIZE_BYTES=$(stat -c%s "$BINARY_PATH" 2>/dev/null || stat -f%z "$BINARY_PATH" 2>/dev/null)
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          
          echo "Binary size: ${SIZE_MB}MB (limit: ${{ matrix.max-size-mb }}MB)"
          
          if [ $SIZE_MB -gt ${{ matrix.max-size-mb }} ]; then
            echo "Error: Binary size exceeds limit!"
            exit 1
          fi

      - name: "Upload AOT artifact"
        uses: actions/upload-artifact@v7
        with:
          name: kit-${{ matrix.runtime }}
          path: ./publish/${{ matrix.runtime }}/
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout"
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: "Install .NET SDK"
        uses: actions/setup-dotnet@v5.1.0
        with:
          global-json-file: "./global.json"

      - name: "Check formatting"
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: "Run code analysis"
        run: dotnet build -c Release